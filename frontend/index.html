<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocNexus AI</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
        background: #EEF2F7;
        color: #0F172A;
        -webkit-font-smoothing: antialiased;
      }

      :focus-visible {
        outline: 2px solid #0891B2;
        outline-offset: 2px;
        border-radius: 4px;
      }

      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 99px; }
      ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

      /* Primary button */
      .btn-primary {
        background: linear-gradient(135deg, #0F2044 0%, #1e3a6e 100%);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 26px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
        letter-spacing: 0.01em;
      }
      .btn-primary:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 6px 18px rgba(15, 32, 68, 0.32);
      }
      .btn-primary:active:not(:disabled) { transform: translateY(0); box-shadow: none; }
      .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

      /* Spinner */
      @keyframes spin { to { transform: rotate(360deg); } }
      .spinner {
        width: 13px; height: 13px;
        border: 2px solid rgba(255,255,255,0.35);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
        flex-shrink: 0;
      }

      /* Filter chips */
      .chip {
        border: 1.5px solid #E2E8F0;
        border-radius: 99px;
        padding: 4px 13px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        background: #fff;
        color: #475569;
        transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      }
      .chip:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.10); }
      .chip.active {
        background: linear-gradient(135deg, #0F2044, #0891B2);
        color: #fff;
        border-color: transparent;
        box-shadow: 0 2px 8px rgba(8,145,178,0.30);
      }

      /* Sample query links */
      .sample-link {
        display: block;
        font-size: 12.5px;
        color: #0891B2;
        text-decoration: none;
        padding: 4px 0;
        border-radius: 4px;
        transition: color 0.15s, padding-left 0.15s;
        cursor: pointer;
        background: none;
        border: none;
        text-align: left;
        width: 100%;
      }
      .sample-link:hover { color: #0F2044; padding-left: 6px; }

      /* Download button */
      .download-btn {
        transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      }
      .download-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 18px rgba(15, 32, 68, 0.28);
        filter: brightness(1.08);
      }

      /* Trace row animation */
      @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateY(5px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .trace-row { animation: fadeSlideIn 0.22s ease forwards; }

      /* Copy button */
      .copy-btn {
        transition: background 0.15s, color 0.15s, border-color 0.15s;
        cursor: pointer;
      }
      .copy-btn:hover { background: #E2E8F0 !important; }
      .copy-btn.copied { background: #D1FAE5 !important; color: #065F46 !important; border-color: #A7F3D0 !important; }

      /* Textarea and select focus */
      .query-textarea:focus { border-color: #0891B2 !important; box-shadow: 0 0 0 3px rgba(8,145,178,0.12) !important; }
      .state-select:focus { border-color: #0891B2 !important; outline: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
